<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodePTIT Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-header-left">
        <div class="popup-logo">CP</div>
        <div class="popup-header-text">
          <h1 class="popup-title">CodePTIT Helper</h1>
          <span class="popup-version">v1.0.0</span>
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- Current Problem -->
    <div class="popup-section">
      <div class="section-label">Bài hiện tại</div>
      <div class="current-problem" id="current-problem">
        <span class="problem-none">Không có bài nào đang mở</span>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="popup-section">
      <div class="section-label">Thao tác nhanh</div>
      <div class="action-grid" id="action-grid">
        <button class="action-btn" data-action="copy-problem" title="Copy Problem (Alt+C)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Problem</span>
        </button>
        <button class="action-btn" data-action="copy-input" title="Copy Input (Alt+I)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4"/></svg>
          <span>Input</span>
        </button>
        <button class="action-btn" data-action="copy-output" title="Copy Output (Alt+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9"/><path d="m16 13-4-4-4 4"/><path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4"/></svg>
          <span>Output</span>
        </button>
        <button class="action-btn" data-action="download" title="Download Testcase (Alt+D)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Download</span>
        </button>
      </div>
    </div>

    <!-- History -->
    <div class="popup-section">
      <div class="section-label">Lịch sử gần đây</div>
      <div class="history-list" id="history-list">
        <span class="history-empty">Chưa có lịch sử</span>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="popup-section popup-shortcuts">
      <div class="section-label">Phím tắt</div>
      <div class="shortcut-grid">
        <div class="shortcut-item"><kbd>Alt+C</kbd> Copy Problem</div>
        <div class="shortcut-item"><kbd>Alt+I</kbd> Copy Input</div>
        <div class="shortcut-item"><kbd>Alt+O</kbd> Copy Output</div>
        <div class="shortcut-item"><kbd>Alt+D</kbd> Download</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a href="https://code.ptit.edu.vn" target="_blank">code.ptit.edu.vn</a>
      <span>•</span>
      <a href="https://github.com/codeptit-helper" target="_blank">GitHub</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
